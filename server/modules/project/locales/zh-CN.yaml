rbac.permissionCatalog.projectView.display: 查看 Compose 项目
rbac.permissionCatalog.projectView.description: 读取已注册 Compose 项目的摘要和只读详情。
rbac.permissionCatalog.projectImport.display: 导入 Compose 项目
rbac.permissionCatalog.projectImport.description: 校验并导入外部 Compose 项目到项目注册表。
rbac.permissionCatalog.projectRefresh.display: 刷新 Compose 项目
rbac.permissionCatalog.projectRefresh.description: 刷新项目快照和只读配置投影视图。
rbac.permissionCatalog.projectLifecycle.display: 管理 Compose 项目生命周期
rbac.permissionCatalog.projectLifecycle.description: 执行受限的 Compose 生命周期动作，例如 up、down 和 restart。
rbac.permissionCatalog.projectDestroy.display: 注销或销毁 Compose 项目
rbac.permissionCatalog.projectDestroy.description: 对项目记录执行注销和受保护的销毁动作。
rbac.permissionCatalog.projectCreate.display: 创建受管 Compose 项目
rbac.permissionCatalog.projectCreate.description: 检查受管根目录 authority，并访问后续的 managed create 工作流。
rbac.permissionCatalog.projectSourceView.display: 查看项目来源目录
rbac.permissionCatalog.projectSourceView.description: 查看 Phase 3 的来源目录和 managed、git、template 项目入口路由边界。
rbac.permissionCatalog.projectDiscoveryView.display: 查看项目发现候选项
rbac.permissionCatalog.projectDiscoveryView.description: 查看受限的本机目录扫描和自动发现候选预览，不直接注册项目。
rbac.permissionCatalog.projectDeploy.display: 部署受管 Compose 项目草稿
rbac.permissionCatalog.projectDeploy.description: 在 bounded project authority 内对受管项目配置草稿执行 diff、validate 和 deploy。
ops.project.source.managed.description: 在 project authority 拥有的 canonical managed root 下创建受管 Compose 项目。
ops.project.source.git.description: 预留 canonical git-backed 项目来源边界，但本批次不引入 clone、scan 或 remote-host 执行。
ops.project.source.template.description: 预留 canonical template-backed 项目来源边界，但本批次不引入模板实例化、发现或 remote-host 执行。
ops.project.source.remoteHost.description: 预留 canonical remote-host 项目边界，但本批次不引入远程执行、密钥持久化或 runtime ownership。
ops.project.discovery.candidates.ready: 项目发现候选预览已就绪。
