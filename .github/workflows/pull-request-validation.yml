name: Pull Request Validation

on:
  pull_request:
    branches: [main]
#    paths:
#      - ".github/workflows/**"
#      - "AGENTS.md"
#      - "README.md"
#      - "ai-plan/**"
#      - "server/**"
#      - "web/**"
  push:
    branches: [main]
#    paths:
#      - ".github/workflows/**"
#      - "AGENTS.md"
#      - "README.md"
#      - "ai-plan/**"
#      - "server/**"
#      - "web/**"

permissions:
  actions: read
  contents: read

env:
  GOLANGCI_LINT_VERSION: v2.12.2

# Workflow jobs are execution-layer slices of repository validation truth.
# Acceptance criteria remain defined by root AGENTS.md and the repository entrypoints it names.

jobs:
  secret-scan:
    name: Secret Scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70
        with:
          path: .
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}

  contract-governance-check:
    name: Contract Governance Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Run contract governance check
        shell: bash
        run: |
          scanner="scripts/magic_value/check_magic_values.py"
          if [ ! -f "$scanner" ]; then
            echo "::notice title=Contract governance skipped::Missing $scanner; CI wiring is in place but the scanner has not been added on this branch."
            exit 0
          fi
          python3 "$scanner" --mode ci --output-json /tmp/contract-governance-ci.json

      - name: Upload contract governance report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: contract-governance-ci
          path: /tmp/contract-governance-ci.json
          if-no-files-found: ignore

  contract-drift-report:
    name: Contract Drift Report
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Run contract drift report
        shell: bash
        run: |
          scanner="scripts/magic_value/check_magic_values.py"
          if [ ! -f "$scanner" ]; then
            echo "::notice title=Contract drift report skipped::Missing $scanner; report wiring is in place but the scanner has not been added on this branch."
            exit 0
          fi
          python3 "$scanner" --mode report --output-json /tmp/contract-governance-report.json

      - name: Upload contract drift report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: contract-governance-report
          path: /tmp/contract-governance-report.json
          if-no-files-found: ignore

  eff-u-code-quality-gate:
    name: Graft Quality Policy Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.13

      - name: Install repository root quality tool dependencies
        run: bun install --frozen-lockfile

      - name: Resolve quality gate base branch
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_branch="${{ github.event.pull_request.base.ref }}"
          else
            base_branch="main"
          fi

          if [[ -z "${base_branch}" ]]; then
            echo "::error title=Quality gate base branch missing::Unable to resolve the base branch for Graft Quality Policy."
            exit 1
          fi

          if ! git fetch --no-tags --prune origin "${base_branch}"; then
            echo "::error title=Quality gate base fetch failed::Run 'git fetch origin ${base_branch}' and retry."
            exit 1
          fi

          base_ref="refs/remotes/origin/${base_branch}"
          if ! git rev-parse --verify "${base_ref}" >/dev/null 2>&1; then
            if ! fetched_sha="$(git rev-parse --verify FETCH_HEAD 2>/dev/null)"; then
              echo "::error title=Quality gate base ref verify failed::Fetched ${base_branch} but neither ${base_ref} nor FETCH_HEAD is available in the current checkout."
              exit 1
            fi
            base_ref="${fetched_sha}"
          fi

          echo "GRAFT_QUALITY_BASE_SHA=${base_ref}" >> "$GITHUB_ENV"
          echo "GITHUB_BASE_REF=${base_branch}" >> "$GITHUB_ENV"

      - name: Run Graft Quality Policy evaluator
        run: |
          bun run quality:eff-u-code:gate -- \
            --scan-mode changed \
            --base-ref "${GITHUB_BASE_REF}" \
            --output-json .tmp/eff-u-code-gate/report.json \
            --report-dir .tmp/eff-u-code-gate/raw

      - name: Upload Graft Quality Policy report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: eff-u-code-gate-report
          path: .tmp/eff-u-code-gate
          if-no-files-found: ignore

  web-check:
    name: Web Check
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.13

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Run unified web validation entrypoint
        working-directory: web
        run: bun run check

      - name: Upload web test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: web-test-results
          path: web/.tmp/test-results/ctrf-report.json
          if-no-files-found: ignore

      - name: Publish web test report
        if: always()
        uses: ctrf-io/github-test-reporter@e500b992f936420eb633c91644cf10d4d71df700
        with:
          report-path: ./web/.tmp/test-results/ctrf-report.json
          github-report: true
          status-check: true
          status-check-name: Web Test Results
          pull-request: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
          overwrite-comment: true
          always-latest-comment: true
          comment-tag: graft-web-tests
          summary-delta-report: true
          insights-report: true
          flaky-rate-report: true
          fail-rate-report: true
          slowest-report: true
          annotate: true
          upload-artifact: true
          fetch-previous-results: true
          exit-on-no-files: false
          exit-on-empty: false
          exit-on-fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  server-lint:
    name: Server Lint Stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: server/go.mod
          cache: true
          cache-dependency-path: |
            server/go.mod
            server/go.sum

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: server
          install-only: true

      - name: Resolve backend lint base branch
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_branch="${{ github.event.pull_request.base.ref }}"
          else
            base_branch="main"
          fi

          if [[ -z "${base_branch}" ]]; then
            echo "::error title=Backend lint gate base branch missing::Unable to resolve the base branch for server lint."
            exit 1
          fi

          if ! git fetch --no-tags --prune origin "${base_branch}"; then
            echo "::error title=Backend lint gate base fetch failed::Run 'git fetch origin ${base_branch}' and retry."
            exit 1
          fi

          base_ref="refs/remotes/origin/${base_branch}"
          base_source="remote-tracking ref"
          if ! git rev-parse --verify "${base_ref}" >/dev/null 2>&1; then
            if ! fetched_sha="$(git rev-parse --verify FETCH_HEAD 2>/dev/null)"; then
              echo "::error title=Backend lint gate base ref verify failed::Fetched ${base_branch} but neither ${base_ref} nor FETCH_HEAD is available in the current checkout."
              git rev-parse HEAD
              git branch -a
              exit 1
            fi

            base_ref="${fetched_sha}"
            base_source="FETCH_HEAD commit"
          fi

          echo "Resolved backend lint base ref ${base_ref} (${base_source}) for HEAD $(git rev-parse HEAD)"
          git branch -a --list "remotes/origin/${base_branch}"

          echo "GRAFT_LINT_BASE_REF=${base_ref}" >> "$GITHUB_ENV"

      - name: Run repository backend lint stage
        working-directory: server
        run: go run ./cmd/graft validate backend --stage lint

  server-lint-audit:
    name: Server Lint Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: server/go.mod
          cache: true
          cache-dependency-path: |
            server/go.mod
            server/go.sum

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: server
          install-only: true

      - name: Run full-repo backend lint audit
        working-directory: server
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          golangci-lint run --config .golangci.yml ./... | tee /tmp/server-golangci-lint-audit.txt

      - name: Upload backend lint audit artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: server-golangci-lint-audit
          path: /tmp/server-golangci-lint-audit.txt
          if-no-files-found: error

  server-build-test:
    name: Server Build/Test Stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: server/go.mod
          cache: true
          cache-dependency-path: |
            server/go.mod
            server/go.sum

      - name: Run repository backend build/test stage
        working-directory: server
        run: go run ./cmd/graft validate backend --stage buildtest

  server-test-report:
    name: Server Test Report
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: server/go.mod
          cache: true
          cache-dependency-path: |
            server/go.mod
            server/go.sum

      - name: Run server tests with CTRF report
        shell: bash
        run: python3 scripts/test-reporting/run_server_ctrf_report.py --output .tmp/test-results/server-go-test-ctrf.json

      - name: Upload server test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: server-test-results
          path: .tmp/test-results/server-go-test-ctrf.json
          if-no-files-found: ignore

      - name: Publish server test report
        if: always()
        uses: ctrf-io/github-test-reporter@e500b992f936420eb633c91644cf10d4d71df700
        with:
          report-path: ./.tmp/test-results/server-go-test-ctrf.json
          github-report: true
          status-check: true
          status-check-name: Server Test Results
          pull-request: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
          overwrite-comment: true
          always-latest-comment: true
          comment-tag: graft-server-tests
          summary-delta-report: true
          insights-report: true
          flaky-rate-report: true
          fail-rate-report: true
          slowest-report: true
          annotate: true
          upload-artifact: true
          fetch-previous-results: true
          exit-on-no-files: false
          exit-on-empty: false
          exit-on-fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
