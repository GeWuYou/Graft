name: Pull Request Validation

on:
  pull_request:
    branches: [main]
#    paths:
#      - ".github/workflows/**"
#      - "AGENTS.md"
#      - "README.md"
#      - "ai-plan/**"
#      - "server/**"
#      - "web/**"
  push:
    branches: [main]
#    paths:
#      - ".github/workflows/**"
#      - "AGENTS.md"
#      - "README.md"
#      - "ai-plan/**"
#      - "server/**"
#      - "web/**"

permissions:
  contents: read

env:
  GOLANGCI_LINT_VERSION: v2.12.2

# Workflow jobs are execution-layer slices of repository validation truth.
# Acceptance criteria remain defined by root AGENTS.md and the repository entrypoints it names.

jobs:
  web-check:
    name: Web Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Run unified web validation entrypoint
        working-directory: web
        run: bun run check

  server-lint:
    name: Server Lint Stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: server
          install-only: true

      - name: Run repository backend lint stage
        working-directory: server
        run: go run ./cmd/graft validate backend --stage lint

  server-build-test:
    name: Server Build/Test Stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod

      - name: Run repository backend build/test stage
        working-directory: server
        run: go run ./cmd/graft validate backend --stage buildtest
