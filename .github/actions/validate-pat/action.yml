name: Validate PAT
description: Validate that the release PAT can access the repository and push tags.

inputs:
  pat-token:
    description: Personal access token used by semantic-release.
    required: true
  repo-api-url:
    description: GitHub repository API URL, for example https://api.github.com/repos/owner/repo.
    required: true
  repository:
    description: Repository slug used in error messages.
    required: true
  missing-token-message:
    description: Error message emitted when the PAT is absent.
    required: true
  workflow-dispatch-probe:
    description: Optional workflow file name to probe for workflow_dispatch permission without creating a real run.
    required: false
    default: ""
  workflow-dispatch-required-message:
    description: Error message emitted when the PAT cannot dispatch the requested workflow.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Validate PAT can push
      shell: bash
      env:
        PAT_TOKEN: ${{ inputs.pat-token }}
        REPO_API_URL: ${{ inputs.repo-api-url }}
        REPOSITORY: ${{ inputs.repository }}
        MISSING_TOKEN_MESSAGE: ${{ inputs.missing-token-message }}
        WORKFLOW_DISPATCH_PROBE: ${{ inputs.workflow-dispatch-probe }}
        WORKFLOW_DISPATCH_REQUIRED_MESSAGE: ${{ inputs.workflow-dispatch-required-message }}
      run: |
        if [ -z "${PAT_TOKEN}" ]; then
          echo "::error::${MISSING_TOKEN_MESSAGE}"
          exit 1
        fi

        response_file="$(mktemp)"
        trap 'rm -f "${response_file}"' EXIT

        status_code="$(
          curl -sS -o "${response_file}" -w "%{http_code}" \
            --connect-timeout 10 \
            --max-time 30 \
            -H "Authorization: Bearer ${PAT_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${REPO_API_URL}"
        )"

        case "${status_code}" in
          200)
            # The repository endpoint returns 200 for read-only tokens too.
            # semantic-release still needs to push the computed version tag.
            push_ok="$(jq -r '.permissions.push // false' "${response_file}")"
            if [ "${push_ok}" != "true" ]; then
              echo "::error::PAT_TOKEN can read ${REPOSITORY} but lacks push permission. semantic-release requires contents:write."
              cat "${response_file}"
              exit 1
            fi
            ;;
          401|403)
            echo "::error::PAT_TOKEN is invalid or lacks access to ${REPOSITORY} (HTTP ${status_code})."
            cat "${response_file}"
            exit 1
            ;;
          *)
            echo "::error::Failed to validate PAT_TOKEN against ${REPO_API_URL} (HTTP ${status_code})."
            cat "${response_file}"
            exit 1
            ;;
        esac

        if [ -n "${WORKFLOW_DISPATCH_PROBE}" ]; then
          dispatch_probe_file="$(mktemp)"
          trap 'rm -f "${response_file}" "${dispatch_probe_file}"' EXIT

          dispatch_status_code="$(
            curl -sS -o "${dispatch_probe_file}" -w "%{http_code}" \
              --connect-timeout 10 \
              --max-time 30 \
              -X POST \
              -H "Authorization: Bearer ${PAT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${REPO_API_URL}/actions/workflows/${WORKFLOW_DISPATCH_PROBE}/dispatches" \
              -d '{"ref":"__graft_permission_probe__"}'
          )"

          case "${dispatch_status_code}" in
            204|422)
              # 422 is expected because the probe ref must not exist; it still proves dispatch permission.
              ;;
            401|403)
              if [ -n "${WORKFLOW_DISPATCH_REQUIRED_MESSAGE}" ]; then
                echo "::error::${WORKFLOW_DISPATCH_REQUIRED_MESSAGE}"
              else
                echo "::error::PAT_TOKEN cannot dispatch ${WORKFLOW_DISPATCH_PROBE}."
              fi
              cat "${dispatch_probe_file}"
              exit 1
              ;;
            *)
              echo "::error::Failed to probe workflow_dispatch permission for ${WORKFLOW_DISPATCH_PROBE} (HTTP ${dispatch_status_code})."
              cat "${dispatch_probe_file}"
              exit 1
              ;;
          esac
        fi
