post:
  tags: [rbac]
  summary: Replace role permissions
  operationId: postRolePermissionAssign
  description: |
    Replaces the role's permission bindings with the provided stable permission id set
    and preserves the existing replace semantics for `permission_ids`.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - name: id
      in: path
      required: true
      description: Target role id.
      schema:
        type: integer
        format: int64
        minimum: 1
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/replace-role-permissions-request.yaml
  responses:
    '200':
      description: Role permissions replaced.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-empty-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
