post:
  tags: [announcements]
  summary: Publish an announcement
  operationId: postAnnouncementPublish
  description: Publishes a draft announcement or re-publishes an archived announcement. The server writes published_at to the current service time and published_by to the actor. publish_at is the visibility start time; omitted or null stores publish_at as null for immediate visibility after publish.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - $ref: ../components/parameters/announcement-id-path.yaml
  requestBody:
    required: false
    content:
      application/json:
        schema:
          $ref: ../components/schemas/publish-announcement-request.yaml
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Published announcement.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-announcement-item.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      description: Announcement was not found.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
