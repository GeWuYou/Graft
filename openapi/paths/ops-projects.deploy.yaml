post:
  tags: [project]
  summary: Deploy a managed project configuration draft
  operationId: postProjectDeploy
  description: >
    Writes one managed project draft to the tracked Compose and optional env files, refreshes the project snapshot,
    and runs `docker compose up -d` through project-owned lifecycle execution without introducing runtime-state
    persistence in the project module.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - $ref: ../components/parameters/project-id-path.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/project-deploy-request.yaml
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Managed project draft deployed.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-project-deploy-response.yaml
    '400':
      description: Invalid project id or deploy payload.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      description: Project record not found.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '409':
      description: Deploy was blocked by project authority, bounded scope, or lifecycle execution.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
