post:
  tags: [project]
  summary: Validate a managed Compose project create request
  operationId: postProjectCreateValidate
  description: Validates managed-root authority, target paths, and bounded create inputs without writing files or registering a project.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/project-create-validate-request.yaml
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Managed create validation result.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-project-create-validate-response.yaml
    '400':
      description: Invalid managed create request.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '409':
      description: Managed create validation blocked by managed-root authority, ownership, or runtime guard.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
