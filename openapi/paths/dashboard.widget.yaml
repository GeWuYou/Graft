get:
  tags: [dashboard]
  summary: Read dashboard widget
  operationId: getDashboardWidget
  description: Returns one visible dashboard widget by id for focused refresh and retry flows.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - name: widget_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Dashboard widget.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-dashboard-widget.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '404':
      description: Dashboard widget was not found or is not visible to the current user.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
