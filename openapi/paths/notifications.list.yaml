get:
  tags: [notifications]
  summary: List current-user notifications
  operationId: getNotifications
  description: Returns paged notification deliveries visible to the current user.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - name: status
      in: query
      schema:
        type: string
        default: all
        enum: [all, unread, read]
    - name: severity
      in: query
      schema:
        $ref: ../components/schemas/notification-severity.yaml
    - name: category
      in: query
      schema:
        $ref: ../components/schemas/notification-category.yaml
    - name: source_module
      in: query
      schema:
        type: string
    - name: occurred_from
      in: query
      schema:
        type: string
        format: date-time
    - name: occurred_to
      in: query
      schema:
        type: string
        format: date-time
    - name: page
      in: query
      schema:
        type: integer
        minimum: 1
    - name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Current-user notification page.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-notification-list-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
