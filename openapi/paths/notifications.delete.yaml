delete:
  tags: [notifications]
  summary: Delete one current-user notification delivery
  operationId: deleteNotification
  description: Deletes one notification delivery from the current-user view.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - name: delivery_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Notification delivery deleted.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-empty-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      description: Notification delivery was not found in the current-user scope.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
