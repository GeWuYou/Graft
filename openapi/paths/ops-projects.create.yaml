post:
  tags: [project]
  summary: Submit a managed Compose project create request
  operationId: postProjectCreate
  description: Reserves the canonical managed-create route space. Phase 2 batch 1 returns an accepted contract response without writing files yet.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/project-create-validate-request.yaml
  security:
    - bearerAuth: []
  responses:
    '202':
      description: Managed create request accepted by the bounded contract owner.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-project-create-response.yaml
    '400':
      description: Invalid managed create request.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
