get:
  tags: [project]
  summary: Get Compose project service aggregation
  operationId: getProjectServices
  description: >
    Returns Project-owned static service definitions plus bounded container membership counts. Container
    remains the runtime authority for detail, logs, events, stats, and shell.
  parameters:
    - $ref: ../components/parameters/locale-header.yaml
    - $ref: ../components/parameters/request-id-header.yaml
    - $ref: ../components/parameters/project-id-path.yaml
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Compose project service aggregation.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/enveloped-project-services-response.yaml
    '400':
      description: Invalid project id.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '401':
      $ref: ../components/responses/unauthorized.yaml
    '403':
      $ref: ../components/responses/forbidden.yaml
    '404':
      description: Project record not found.
      headers:
        X-Request-Id:
          $ref: ../components/headers/request-id.yaml
      content:
        application/json:
          schema:
            $ref: ../components/schemas/error-response.yaml
    '500':
      $ref: ../components/responses/internal-server-error.yaml
