name: limit
in: query
required: false
description: Optional maximum number of projects to return. The runtime accepts values from 1 to 100.
schema:
  type: integer
  minimum: 1
  maximum: 100
examples:
  defaultWindow:
    summary: Fetch the default project list window
    value: 20
  maxWindow:
    summary: Fetch up to the maximum supported window
    value: 100
