type: object
required:
  - title
  - content
  - level
  - delivery_mode
properties:
  title:
    type: string
    minLength: 1
    maxLength: 200
  content:
    type: string
    minLength: 1
  level:
    $ref: ./announcement-level.yaml
  delivery_mode:
    $ref: ./announcement-delivery-mode.yaml
  pinned:
    type: boolean
    default: false
  publish_at:
    type: string
    format: date-time
    nullable: true
    description: Announcement visibility start time. Updating this field changes only the effective visibility window, not the latest publish action time.
  expire_at:
    type: string
    format: date-time
    nullable: true
    description: Announcement visibility end time. Null means long-term valid.
