allOf:
  - $ref: ./project-list-item.yaml
  - type: object
    required:
      - compose_files
      - env_files
    properties:
      last_refresh_error_code:
        type: string
        description: Stable error code from the latest failed refresh. Empty string means no recorded failure.
      last_refresh_error_message:
        type: string
        description: Fallback error message from the latest failed refresh.
      last_refresh_config_hash:
        type: string
      last_observed_config_hash:
        type: string
      last_drift_checked_at:
        type: string
        format: date-time
        nullable: true
      compose_files:
        type: array
        items:
          $ref: ./project-file-item.yaml
      env_files:
        type: array
        items:
          $ref: ./project-file-item.yaml
