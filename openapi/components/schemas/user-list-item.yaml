type: object
required: [id, username, display, status, roles, created_at, updated_at]
properties:
  id:
    type: integer
    format: int64
    minimum: 0
  username:
    type: string
  display:
    type: string
  status:
    type: string
  roles:
    type: array
    description: Minimal role summaries embedded in the user list to avoid row-level role fetch fanout.
    items:
      $ref: ./user-role-summary.yaml
  created_at:
    type: string
  updated_at:
    type: string
