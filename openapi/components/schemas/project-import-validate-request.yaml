type: object
required:
  - working_directory
properties:
  working_directory:
    type: string
    minLength: 1
  compose_files:
    type: array
    description: Ordered Compose file list. Phase 1 UI may submit one file, but the authority contract stays multi-file.
    items:
      type: string
      minLength: 1
  env_files:
    type: array
    items:
      type: string
      minLength: 1
  display_name:
    type: string
    minLength: 1
    maxLength: 120
  canonical_project_name_override:
    type: string
    minLength: 1
    nullable: true
