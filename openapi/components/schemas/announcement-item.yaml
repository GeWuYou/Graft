type: object
required:
  - id
  - title
  - content
  - level
  - status
  - delivery_mode
  - pinned
  - created_at
  - updated_at
properties:
  id:
    type: integer
    format: int64
    minimum: 1
  title:
    type: string
    minLength: 1
  content:
    type: string
    minLength: 1
  level:
    $ref: ./announcement-level.yaml
  status:
    $ref: ./announcement-status.yaml
  delivery_mode:
    $ref: ./announcement-delivery-mode.yaml
  pinned:
    type: boolean
  publish_at:
    type: string
    format: date-time
    nullable: true
    description: Announcement visibility start time. Null means the announcement becomes visible immediately after publish. Future values schedule visibility; past values preserve a backfilled effective time.
  published_at:
    type: string
    format: date-time
    nullable: true
    description: Time of the latest publish or re-publish action. Used for audit and management display only; it does not participate in current-user visibility.
  published_by:
    type: integer
    format: int64
    minimum: 1
    nullable: true
    description: User id that performed the latest publish or re-publish action. Existing rows may remain null.
  archived_at:
    type: string
    format: date-time
    nullable: true
    description: Manual archive time. Meaningful only when status is archived and cleared on publish or re-publish.
  expire_at:
    type: string
    format: date-time
    nullable: true
    description: Announcement visibility end time. Null means long-term valid; expiry hides the announcement from current-user endpoints without changing status.
  created_by:
    type: integer
    format: int64
    minimum: 1
    nullable: true
  updated_by:
    type: integer
    format: int64
    minimum: 1
    nullable: true
  deleted_by:
    type: integer
    format: int64
    minimum: 1
    nullable: true
  read_at:
    type: string
    format: date-time
    nullable: true
    description: Current user's read time when returned by current-user endpoints.
  unread:
    type: boolean
    description: Current-user unread state when returned by current-user endpoints.
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
