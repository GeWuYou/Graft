type: object
required: [build, started_at, uptime_seconds, go_version, app_name, app_env]
properties:
  build:
    $ref: ./server-status-server-build-info.yaml
  started_at:
    type: string
    format: date-time
  uptime_seconds:
    type: integer
    format: int64
  go_version:
    type: string
  app_name:
    type: string
  app_env:
    type: string
example:
  build:
    version: dev
    git_commit: unknown
    build_time_utc: unknown
    git_tree_state: unknown
  started_at: '2026-05-24T08:00:00Z'
  uptime_seconds: 300
  go_version: go1.25.1
  app_name: graft
  app_env: prod
