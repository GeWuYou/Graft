type: object
required: [items]
properties:
  items:
    type: array
    items:
      type: object
      required: [id, title_key, title, occurred_at]
      properties:
        id:
          type: string
        title_key:
          type: string
        title:
          type: string
        description_key:
          type: string
        description:
          type: string
        occurred_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [normal, success, warning, error]
        route_location:
          type: string
  empty_key:
    type: string
  empty:
    type: string
