type: object
required:
  - id
  - action
  - success
properties:
  id:
    type: string
  name:
    type: string
  action:
    type: string
    enum: [start, stop, restart, remove]
  success:
    type: boolean
  error_code:
    type: string
  message_key:
    type: string
  message:
    type: string
additionalProperties: false
