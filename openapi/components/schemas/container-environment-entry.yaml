type: object
required:
  - key
  - masked
  - sensitive
  - source
properties:
  key:
    type: string
    description: Environment variable name.
  value:
    type: string
    description: Raw environment variable value. Present only when the effective policy allows plaintext display.
  copy_value:
    type: string
    description: Copy-only raw environment variable value. Present only when the effective policy keeps display masked but allows authorized real-value copy.
  display_value:
    type: string
    description: Stable display value rendered under the effective environment policy.
  value_masked:
    type: boolean
    description: Whether display_value is a masked placeholder instead of the original value.
  value_hidden:
    type: boolean
    description: Whether the original value is intentionally hidden by the active policy.
  masked:
    type: boolean
    description: Whether the original value is intentionally omitted by environment display policy.
  sensitive:
    type: boolean
    description: Whether the key matched the container module sensitive-key heuristic.
  source:
    type: string
    enum: [docker]
    x-enum-varnames:
      - ContainerEnvironmentEntrySourceDocker
    description: Runtime source of the environment variable entry.
description: Container environment variable entry after policy application.
