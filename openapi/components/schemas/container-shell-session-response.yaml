type: object
required:
  - session_id
  - expires_at
  - websocket_url
  - command
  - cols
  - rows
properties:
  session_id:
    type: string
    description: Stable server-issued session identifier used for audit correlation.
  expires_at:
    type: string
    format: date-time
    description: Absolute UTC expiration time for the one-time shell ticket.
  websocket_url:
    type: string
    description: Relative WebSocket URL containing the issued ticket for immediate upgrade.
  command:
    type: string
    enum: [sh, bash, ash]
    x-enum-varnames:
      - ContainerShellSessionResponseCommandValueSh
      - ContainerShellSessionResponseCommandValueBash
      - ContainerShellSessionResponseCommandValueAsh
  cols:
    type: integer
    minimum: 1
    maximum: 1000
  rows:
    type: integer
    minimum: 1
    maximum: 1000
