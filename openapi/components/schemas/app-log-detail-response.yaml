type: object
required:
  - id
  - occurred_at
  - severity
  - component
  - message
  - operation
  - request_id
  - trace_id
  - route
  - method
  - error
  - fields
properties:
  id:
    type: integer
    format: int64
  occurred_at:
    type: string
    format: date-time
  severity:
    type: string
    enum: [debug, info, warn, error]
  component:
    type: string
  message:
    type: string
  operation:
    type: string
  request_id:
    type: string
  trace_id:
    type: string
  route:
    type: string
  method:
    type: string
  error:
    type: string
  fields:
    type: object
    additionalProperties:
      type: string
