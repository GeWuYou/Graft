type: object
required:
  - candidate_key
  - candidate_kind
  - source_kind
  - display_name
  - canonical_project_name
  - canonical_project_name_source
  - working_directory
  - ownership_mode
  - host_scope
  - status
  - recommended_action
  - compose_files
  - env_files
  - declared_service_names
  - service_count
  - config_hash
  - warnings
  - conflicts
properties:
  candidate_key:
    type: string
  candidate_kind:
    $ref: ./project-discovery-candidate-kind.yaml
  source_kind:
    $ref: ./project-source-kind.yaml
  source_type:
    $ref: ./project-source-entry-type.yaml
  source_metadata:
    $ref: ./project-source-metadata.yaml
  display_name:
    type: string
  canonical_project_name:
    type: string
  canonical_project_name_source:
    $ref: ./project-canonical-name-source.yaml
  working_directory:
    type: string
  ownership_mode:
    $ref: ./project-ownership-mode.yaml
  host_scope:
    $ref: ./project-host-scope.yaml
  status:
    $ref: ./project-discovery-candidate-status.yaml
  recommended_action:
    type: string
    enum: [review, import]
    x-enum-varnames:
      - ProjectDiscoveryCandidateActionReview
      - ProjectDiscoveryCandidateActionImport
  status_reason:
    type: string
    nullable: true
  compose_files:
    type: array
    items:
      $ref: ./project-file-item.yaml
  env_files:
    type: array
    items:
      $ref: ./project-file-item.yaml
  declared_service_names:
    type: array
    items:
      type: string
  service_count:
    type: integer
    minimum: 0
  config_hash:
    type: string
  warnings:
    type: array
    items:
      type: string
  conflicts:
    type: array
    items:
      type: string
