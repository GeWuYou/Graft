type: object
required:
  - display_name
  - canonical_project_name
  - relative_project_directory
  - compose_file_name
properties:
  display_name:
    type: string
    minLength: 1
    maxLength: 120
  canonical_project_name:
    type: string
    minLength: 1
    maxLength: 120
  relative_project_directory:
    type: string
    minLength: 1
    description: Relative project directory under the canonical managed root.
  compose_file_name:
    type: string
    minLength: 1
    maxLength: 255
  env_file_name:
    type: string
    minLength: 1
    maxLength: 255
    nullable: true
